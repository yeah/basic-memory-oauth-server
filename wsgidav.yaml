# wsgidav.yaml - WebDAV server exposing the Basic Memory notes directory.
#
# Runs on 127.0.0.1 only and sits BEHIND auth_gateway, which enforces Basic
# Auth itself. WsgiDAV's own auth is therefore anonymous (the gateway is the
# gatekeeper). For standalone local testing you can flip simple_dc to require
# a user (see the commented block).
#
# The share is mapped directly at /dav (NOT via mount_path). This matches how
# the gateway proxies the /dav path through verbatim. Set the path below to the
# absolute path of your Basic Memory notes (WsgiDAV does not expand ~ or $HOME).

host: 127.0.0.1
port: 8002

# Map the /dav URL prefix straight to your notes directory.
# Edit this one line to match your home directory.
provider_mapping:
  "/dav": "/home/ubernaut/basic-memory"

# Behind the gateway: no auth here, the gateway already authenticated the user.
simple_dc:
  user_mapping:
    "*": true   # anonymous access allowed (gateway enforces auth upstream)

# --- For STANDALONE local testing only, comment the block above and use this
# --- instead to require Basic Auth directly against WsgiDAV:
# simple_dc:
#   user_mapping:
#     "*":
#       "testuser":
#         password: "testpass"
#         roles: ["editor"]

property_manager: true
lock_storage: true

dir_browser:
  enable: true

verbose: 3
logging:
  enable_loggers: []
